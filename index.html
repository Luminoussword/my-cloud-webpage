<!DOCTYPE html>
<html>
<head>
    <title>My First Cloud Web Page</title>
</head>
<body style="background-color: #f0f8ff; font-family: Arial, sans-serif;">

    <h1 style="color: darkblue; text-align: center;">
        My First Cloud Web Page
    </h1>

    <p style="color: green; font-size: 18px;">
        Welcome to my web page hosted on the cloud!
    </p>

    <!-- Images Section -->
    <h2 style="color: purple;">Sample Images</h2>

    <img src="https://via.placeholder.com/150" 
         alt="Sample Image 1" 
         style="border: 3px solid black; margin: 10px;">

    <img src="https://via.placeholder.com/200" 
         alt="Sample Image 2" 
         style="border-radius: 10px; margin: 10px;">

    <img src="https://via.placeholder.com/180" 
         alt="Sample Image 3" 
         style="box-shadow: 5px 5px 10px gray; margin: 10px;">

    <!-- Links Section -->
    <h2 style="color: darkred;">Useful Links</h2>

    <a href="https://www.google.com" target="_blank" 
       style="color: blue; text-decoration: none; font-weight: bold;">
        Visit Google
    </a>
    <br><br>

    <a href="https://aws.amazon.com" target="_blank" 
       style="color: orange;">
        Visit AWS
    </a>
    <br><br>

    <a href="https://azure.microsoft.com" target="_blank" 
       style="color: darkcyan;">
        Visit Microsoft Azure
    </a>
    <br><br>

    <a href="https://cloud.google.com" target="_blank" 
       style="color: red;">
        Visit Google Cloud
    </a>

    <!-- Cloud Services Section -->
    <div style="background-color: #ffffff; padding: 15px; margin-top: 20px; border-radius: 8px;">
        <h2 style="color: navy;">Cloud Services</h2>
        <ul style="color: brown; font-size: 16px;">
            <li>AWS</li>
            <li>Azure</li>
            <li>Google Cloud</li>
        </ul>
    </div>
    
</body>
</html>
